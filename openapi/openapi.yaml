openapi: 3.1.0
info:
  title: Greenlight API
  version: 1.0.0
  description: OpenAPI schema for the Greenlight backend API.

servers:
  - url: http://localhost:4000
    description: Local development

tags:
  - name: Health
  - name: Movies
  - name: Users
  - name: Tokens
  - name: Debug

paths:
  /v1/healthcheck:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealthcheck
      responses:
        "200":
          description: Service health information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthcheckResponse"

  /v1/movies:
    get:
      tags: [Movies]
      summary: List movies
      operationId: listMovies
      security:
        - bearerAuth: []
      parameters:
        - name: title
          in: query
          required: false
          schema:
            type: string
        - name: genres
          in: query
          required: false
          description: Comma-separated genres.
          schema:
            type: string
            example: action,drama
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000000
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: id
            enum: [id, title, year, runtime, -id, -title, -year, -runtime]
      responses:
        "200":
          description: A paginated list of movies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Movies]
      summary: Create movie
      operationId: createMovie
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMovieRequest"
      responses:
        "201":
          description: Movie created.
          headers:
            Location:
              description: URL of the newly created movie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/movies/{id}:
    get:
      tags: [Movies]
      summary: Get movie by ID
      operationId: showMovie
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/MovieId"
      responses:
        "200":
          description: Movie details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags: [Movies]
      summary: Update movie
      operationId: updateMovie
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/MovieId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMovieRequest"
      responses:
        "200":
          description: Updated movie details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [Movies]
      summary: Delete movie
      operationId: deleteMovie
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/MovieId"
      responses:
        "200":
          description: Movie deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/users:
    post:
      tags: [Users]
      summary: Register user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequest"
      responses:
        "202":
          description: User registered; activation email queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/users/activated:
    put:
      tags: [Users]
      summary: Activate user account
      operationId: activateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenOnlyRequest"
      responses:
        "200":
          description: User activated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/users/password:
    put:
      tags: [Users]
      summary: Update user password
      operationId: updateUserPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserPasswordRequest"
      responses:
        "200":
          description: Password updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/tokens/authentication:
    post:
      tags: [Tokens]
      summary: Create authentication token
      operationId: createAuthenticationToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuthenticationTokenRequest"
      responses:
        "201":
          description: Authentication token created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticationTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/InvalidCredentialsError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/tokens/activation:
    post:
      tags: [Tokens]
      summary: Send activation token email
      operationId: createActivationToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailOnlyRequest"
      responses:
        "202":
          description: Activation instructions queued for email delivery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/tokens/password-reset:
    post:
      tags: [Tokens]
      summary: Send password reset token email
      operationId: createPasswordResetToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailOnlyRequest"
      responses:
        "202":
          description: Password reset instructions queued for email delivery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /debug/vars:
    get:
      tags: [Debug]
      summary: expvar variables
      operationId: getDebugVars
      description: Runtime metrics and exported variables from `expvar`.
      responses:
        "200":
          description: expvar output.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Use the token from `/v1/tokens/authentication` as `Authorization: Bearer <token>`."

  parameters:
    MovieId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1

  schemas:
    HealthcheckResponse:
      type: object
      required: [status, system_info]
      properties:
        status:
          type: string
          example: available
        system_info:
          type: object
          required: [environment, version]
          properties:
            environment:
              type: string
              example: development
            version:
              type: string
              example: 1.0.0

    Movie:
      type: object
      required: [id, title, year, runtime, genres, version]
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
        title:
          type: string
          maxLength: 500
        year:
          type: integer
          format: int32
          minimum: 1888
        runtime:
          type: string
          description: Runtime represented as "<minutes> mins".
          pattern: '^[0-9]+ mins$'
          example: 102 mins
        genres:
          type: array
          minItems: 1
          maxItems: 5
          items:
            type: string
        version:
          type: integer
          format: int32

    Metadata:
      type: object
      properties:
        current_page:
          type: integer
        page_size:
          type: integer
        first_page:
          type: integer
        last_page:
          type: integer
        total_records:
          type: integer

    User:
      type: object
      required: [id, created_at, name, email, activated]
      properties:
        id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        name:
          type: string
          maxLength: 500
        email:
          type: string
          format: email
        activated:
          type: boolean

    Token:
      type: object
      required: [token, expiry]
      properties:
        token:
          type: string
          minLength: 26
          maxLength: 26
        expiry:
          type: string
          format: date-time

    CreateMovieRequest:
      type: object
      required: [title, year, runtime, genres]
      additionalProperties: false
      properties:
        title:
          type: string
          maxLength: 500
        year:
          type: integer
          format: int32
          minimum: 1888
        runtime:
          type: string
          pattern: '^[0-9]+ mins$'
          example: 102 mins
        genres:
          type: array
          minItems: 1
          maxItems: 5
          items:
            type: string

    UpdateMovieRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          maxLength: 500
        year:
          type: integer
          format: int32
          minimum: 1888
        runtime:
          type: string
          pattern: '^[0-9]+ mins$'
          example: 102 mins
        genres:
          type: array
          minItems: 1
          maxItems: 5
          items:
            type: string

    RegisterUserRequest:
      type: object
      required: [name, email, password]
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 500
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 72

    UpdateUserPasswordRequest:
      type: object
      required: [password, token]
      additionalProperties: false
      properties:
        password:
          type: string
          minLength: 8
          maxLength: 72
        token:
          type: string
          minLength: 26
          maxLength: 26

    TokenOnlyRequest:
      type: object
      required: [token]
      additionalProperties: false
      properties:
        token:
          type: string
          minLength: 26
          maxLength: 26

    EmailOnlyRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email

    CreateAuthenticationTokenRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 72

    MovieResponse:
      type: object
      required: [movie]
      properties:
        movie:
          $ref: "#/components/schemas/Movie"

    MovieListResponse:
      type: object
      required: [movies, metadata]
      properties:
        movies:
          type: array
          items:
            $ref: "#/components/schemas/Movie"
        metadata:
          $ref: "#/components/schemas/Metadata"

    UserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    AuthenticationTokenResponse:
      type: object
      required: [authentication_token]
      properties:
        authentication_token:
          $ref: "#/components/schemas/Token"

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          oneOf:
            - type: string
            - type: object
              additionalProperties:
                type: string

  responses:
    BadRequestError:
      description: Malformed or invalid request body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Missing, malformed, or invalid bearer token.
      headers:
        WWW-Authenticate:
          schema:
            type: string
          description: Bearer challenge header.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InvalidCredentialsError:
      description: Invalid email/password credentials.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Authenticated but not activated or not permitted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Edit conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimitedError:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
